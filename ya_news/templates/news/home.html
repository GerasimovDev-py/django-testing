<!DOCTYPE html>
<html>
<head>
    <title>Новости</title>
</head>
<body>
    <h1>Список новостей</h1>
    {% for news in object_list %}
        <div>
            <h2><a href="{% url 'news:detail' news.id %}">{{ news.title }}</a></h2>
            <p>{{ news.text|truncatewords:30 }}</p>
            <small>{{ news.date }}</small>
        </div>
    {% endfor %}
</body>
</html>
